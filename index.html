<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Invited | Sakun & Hasini</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #dcecff, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    perspective: 1000px;
}

/* Envelope Container */
.envelope-wrapper {
    position: relative;
    width: 450px;
    height: 300px;
    background-color: #083b82;
    border-radius: 0 0 15px 15px;
    box-shadow: 0 20px 50px rgba(0, 40, 100, 0.3);
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
}

.envelope-wrapper:hover {
    transform: translateY(-10px);
}

/* Front Flaps of Envelope using Borders */
.envelope-wrapper::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 150px 225px 150px 225px;
    border-color: transparent #1b66c9 #1552a6 #1b66c9;
    border-radius: 0 0 15px 15px;
    z-index: 3;
}

/* The Top Flap (Lid) */
.envelope-flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 150px 225px 0 225px;
    border-color: #083b82 transparent transparent transparent;
    transform-origin: top;
    z-index: 4;
    transition: transform 0.6s ease-in-out;
}

/* Hidden Card Peek inside the envelope */
.letter-preview {
    position: absolute;
    bottom: 10px;
    left: 25px;
    width: 400px;
    height: 260px;
    background: white url("third/Gemini_Generated_Image.jpeg") center/cover no-repeat;
    border-radius: 10px;
    z-index: 2;
    transition: transform 0.8s ease-in-out 0.6s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    display: flex;
    justify-content: center;
    align-items: center;
}

.letter-text {
    font-family: 'Great Vibes', cursive;
    font-size: 40px;
    color: #083b82;
    background: rgba(255, 255, 255, 0.8);
    padding: 10px 30px;
    border-radius: 30px;
    pointer-events: none;
}

/* Prompt Hint Styling */
.tap-hint {
    position: absolute;
    bottom: -60px;
    width: 100%;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    color: #07346f;
    letter-spacing: 1px;
    text-transform: uppercase;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
}

/* --- ANIMATION STATES WHEN TAPPED --- */
.envelope-wrapper.open .envelope-flap {
    transform: rotateX(180deg);
    z-index: 1; /* Drop behind the card layer once flipped open */
}

.envelope-wrapper.open .letter-preview {
    transform: translateY(-180px) scale(1.05);
}

/* Smooth Page Fade-out transition */
.fade-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #dcecff, #ffffff);
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
}
.fade-screen.active {
    opacity: 1;
}

@media(max-width: 500px) {
    .envelope-wrapper {
        width: 320px;
        height: 213px;
    }
    .envelope-wrapper::before {
        border-width: 106.5px 160px 106.5px 160px;
    }
    .envelope-flap {
        border-width: 106.5px 160px 0 160px;
    }
    .letter-preview {
        width: 280px;
        height: 190px;
        left: 20px;
    }
    .letter-text { font-size: 28px; }
}
</style>
</head>
<body>

<div class="fade-screen" id="transitionOverlay"></div>

<div class="envelope-wrapper" id="envelope" onclick="animateAndRedirect()">
    <div class="envelope-flap"></div>
    <div class="letter-preview">
        <div class="letter-text">Sakun & Hasini</div>
    </div>
    <div class="tap-hint">Tap to Open Envelope</div>
</div>

<script>
function animateAndRedirect() {
    const envelope = document.getElementById("envelope");
    const transitionOverlay = document.getElementById("transitionOverlay");
    
    // Step 1: Trigger the 3D flap and paper slideout animations
    envelope.classList.add("open");
    
    // Step 2: Smoothly fade out screen after card finishes lifting up
    setTimeout(() => {
        transitionOverlay.classList.add("active");
    }, 1300);

    // Step 3: Route smoothly to card.html with autoplay enabled flag
    setTimeout(() => {
        window.location.href = "card.html?autoplay=true";
    }, 2100);
}
</script>

</body>
</html>
