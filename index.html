<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sakun & Hasini Engagement Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

min-height:100vh;

background:
linear-gradient(135deg,#dcecff,#ffffff);

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}


/* Invitation Card */

.card{

max-width:650px;

width:100%;

min-height:750px;

position:relative;

overflow:hidden;

border-radius:35px;

padding:45px 40px;

text-align:center;


/* Image inside card */

background:

linear-gradient(
rgba(255,255,255,0.82),
rgba(255,255,255,0.88)
),

url("Gemini_Generated_Image.png");


background-size:cover;

background-position:center;


box-shadow:

0 25px 70px rgba(0,40,100,.25);


border:2px solid rgba(255,255,255,.8);


animation:appear 1.5s ease;

}


@keyframes appear{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}



h1{

font-family:'Great Vibes',cursive;

font-size:75px;

color:#0b3d91;

margin-bottom:15px;

}


.subtitle{

font-size:18px;

color:#444;

line-height:1.8;

}


.names{

font-size:45px;

font-weight:600;

color:#123b73;

margin:30px 0;

}


.heart{

color:#0b63ce;

display:inline-block;

animation:pulse 1.5s infinite;

}


@keyframes pulse{

50%{
transform:scale(1.2);
}

}



.details{

font-size:18px;

line-height:2;

color:#333;

margin:25px 0;

}


.details strong{

color:#0b3d91;

}



.buttons{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

margin-top:30px;

}


.btn{

padding:14px 35px;

border-radius:40px;

text-decoration:none;

font-weight:600;

transition:.3s;

}


.map{

background:#0b3d91;

color:white;

}


.rsvp{

background:white;

color:#0b3d91;

border:2px solid #0b3d91;

}



.btn:hover{

transform:translateY(-5px);

box-shadow:0 8px 20px rgba(0,0,0,.2);

}



.footer{

margin-top:35px;

font-size:16px;

color:#555;

font-style:italic;

}



@media(max-width:700px){


h1{

font-size:55px;

}


.names{

font-size:32px;

}


.card{

padding:35px 25px;

}


}

</style>

</head>


<body>


<div class="card">


<h1>
You're Invited
</h1>


<p class="subtitle">

Together with our families,<br>

we joyfully invite you to celebrate our

<br>

<strong>Ring Ceremony</strong>

</p>



<div class="names">

Sakun

<span class="heart">♥</span>

Hasini

</div>




<div class="details">


📅 <strong>Saturday, 22 July 2026</strong>

<br>


🕚 11:00 AM onwards


<br>


📍 Mantara Villa

<br>

Matara, Sri Lanka


</div>



<div class="buttons">


<a

class="btn map"

href="https://www.google.com/maps/place/Mantara+Villa+%2F+Hotel/@5.959134,80.5573089"

target="_blank">

View Location

</a>



<a

class="btn rsvp"

href="https://forms.google.com"

target="_blank">

RSVP

</a>


</div>



<div class="footer">

We can't wait to celebrate this beautiful moment with you 💙

</div>



</div>


</body>

</html>
