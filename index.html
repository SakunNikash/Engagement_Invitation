<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sakun & Hasini Engagement Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

font-family:'Poppins',sans-serif;

min-height:100vh;

background:
linear-gradient(135deg,#dcecff,#ffffff);

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}


/* Main invitation */

.card{

width:500px;

height:890px;

position:relative;

overflow:hidden;

border-radius:35px;

box-shadow:
0 25px 70px rgba(0,40,100,.30);

border:3px solid white;

}


/* Background invitation image */

.invitation-bg{

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

object-fit:cover;

border-radius:35px;

z-index:1;

}


/* White transparent layer for readability */

.overlay{

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

background:
rgba(255,255,255,0.35);

z-index:2;

}


/* Content */

.content{

position:relative;

z-index:3;

height:100%;

padding:50px 40px;

text-align:center;

display:flex;

flex-direction:column;

align-items:center;

}



h1{

font-family:'Great Vibes',cursive;

font-size:70px;

color:#083b82;

margin-top:20px;

}



.subtitle{

font-family:"MsGracia", cursive;

font-size:26px;

line-height:1.6;

color:#07346f;

}



.names{

font-size:45px;

font-weight:600;

color:#07346f;

margin:35px 0;

}



.heart{

color:#1b66c9;

animation:pulse 1.5s infinite;

display:inline-block;

}

@font-face {
    font-family: "MsGracia";
    src: url("BeautifulMsGracia Regular.otf") format("opentype");
}

@keyframes pulse{

50%{

transform:scale(1.2);

}

}



.details{

font-size:17px;

line-height:2;

color:#222;

}



.details strong{

color:#07346f;

}



.buttons{

display:flex;

width:100%;

margin-top:35px;

justify-content:center;

align-items:center;

}



.btn{

padding:13px 28px;

border-radius:40px;

text-decoration:none;

font-weight:600;

transition:.3s;

}



.location{

background:#083b82;

color:white;

}



.btn:hover{

transform:translateY(-5px);

}



.footer{

margin-top:25px;

font-size:15px;

color:#333;

font-style:italic;

line-height:1.6;

}




@media(max-width:600px){


.card{

width:95vw;

height:168vw;

max-height:900px;

}


.content{

padding:35px 25px;

}


h1{

font-size:55px;

}


.names{

font-size:35px;

}


}

</style>

</head>



<audio id="bgMusic" autoplay loop>
    <source src="background-music.mp3" type="audio/mp3">
</audio>

<script>

window.addEventListener("load", function(){

    let music = document.getElementById("bgMusic");

    music.volume = 0.5;

    music.play().catch(function(){

        console.log("Browser blocked autoplay");

    });

});

</script>
    

<body>


<div class="card">


<img 
class="invitation-bg"
src="Gemini_Generated_Image.jpeg"
alt="Engagement Invitation Background">


<div class="overlay"></div>



<div class="content">


<h1>
You're Invited
</h1>



<p class="subtitle">

Together with our families,<br>

we joyfully invite you to celebrate our

<br>

<strong>Ring Ceremony</strong>

</p>




<div class="names">

Sakun

<span class="heart">♥</span>

Hasini

</div>




<div class="details">


📅 <strong>Wednesday, 22 July 2026</strong>

<br>


🕚 11:00 AM onwards

<br>


📍 Mantara Villa

<br>

Matara, Sri Lanka


</div>




<div class="buttons">

<a
class="btn location"
href="https://www.google.com/maps/place/Mantara+Villa+%2F+Hotel/@5.959134,80.5573089"
target="_blank">

View Location

</a>

</div>




<div class="footer">

We would be honored to have you share in our special moment 💙

</div>



</div>


</div>


</body>

</html>
