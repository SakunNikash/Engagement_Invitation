<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakun & Hasini Engagement Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #dcecff, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
    opacity: 0;
    animation: fadeInPage 1s ease forwards;
}

@keyframes fadeInPage {
    to { opacity: 1; }
}

/* Main invitation */
.card {
    width: 500px;
    max-width: 95vw;
    min-height: 890px;
    height: auto;
    position: relative;
    overflow: hidden;
    border-radius: 35px;
    box-shadow: 0 25px 70px rgba(0, 40, 100, .30);
    border: 3px solid white;
    animation: appear 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s forwards;
    opacity: 0;
    transform: translateY(30px);
}

@keyframes appear {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Background invitation image */
.invitation-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 35px;
    z-index: 1;
}

/* White transparent layer for readability */
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.35);
    z-index: 2;
}

/* Content */
.content {
    position: relative;
    z-index: 3;
    height: 100%;
    padding: 50px 40px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 70px;
    color: #083b82;
    margin-top: 20px;
}

.subtitle {
    font-family: 'Poppins', sans-serif;
    font-size: 24px;
    font-weight: 400;
    letter-spacing: 0.5px;
    line-height: 1.7;
    color: #07346f;
}

.subtitle strong {
    font-family: 'Great Vibes', cursive;
    font-size: 34px;
    color: #083b82;
}

.names {
    font-size: 45px;
    font-weight: 600;
    color: #07346f;
    margin: 35px 0;
}

.heart {
    color: #1b66c9;
    animation: pulse 1.5s infinite;
    display: inline-block;
}

@keyframes pulse {
    50% { transform: scale(1.2); }
}

.details {
    font-size: 17px;
    line-height: 2;
    color: #222;
}

.details strong {
    color: #07346f;
}

.buttons {
    display: flex;
    width: 100%;
    margin-top: 35px;
    justify-content: center;
    align-items: center;
}

.btn {
    padding: 13px 28px;
    border-radius: 40px;
    text-decoration: none;
    font-weight: 600;
    transition: .3s;
}

.location {
    background: #083b82;
    color: white;
}

.btn:hover {
    transform: translateY(-5px);
}

.footer {
    margin-top: 25px;
    font-size: 15px;
    color: #333;
    font-style: italic;
    line-height: 1.6;
}

@media(max-width: 600px) {
    .card {
        width: 95vw;
        height: 168vw;
        max-height: 900px;
    }
    .content {
        padding: 35px 25px;
    }
    h1 { font-size: 55px; }
    .names { font-size: 35px; }
}
</style>
</head>

<body>

<audio id="bgMusic" loop preload="auto">
    <source src="background-music.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <img class="invitation-bg" src="third/Gemini_Generated_Image.jpeg" alt="Engagement Invitation Background">
    <div class="overlay"></div>

    <div class="content">
        <h1>You're Invited</h1>
        
        <p class="subtitle">
            Together with our families,<br>
            we joyfully invite you to celebrate our<br>
            <strong>Ring Ceremony</strong>
        </p>

        <div class="names">
            Sakun <span class="heart">♥</span> Hasini
        </div>

        <div class="details">
            📅 <strong>Wednesday, 22 July 2026</strong><br>
            🕚 11:00 AM onwards<br>
            📍 Mantara Villa<br>
            Matara, Sri Lanka
        </div>

        <div class="buttons">
            <a class="btn location" href="https://maps.app.goo.gl/6m9KC7otSxXGAVwY8" target="_blank">
                View Location
            </a>
        </div>

        <div class="footer">
            <b>We would be honored to have you share in our special moment 💙</b>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const music = document.getElementById("bgMusic");
    music.volume = 0.5;

    // Read URL parameters passed from index.html
    const urlParams = new URLSearchParams(window.location.search);
    const shouldAutoplay = urlParams.get('autoplay');

    if (shouldAutoplay === 'true') {
        // Attempt clean transition auto-playback
        music.play().catch(err => {
            console.log("Mobile browser cross-page protection active. Subscribing touch listeners.", err);
            
            function forcePlayMusic() {
                music.play().then(() => {
                    document.removeEventListener("click", forcePlayMusic);
                    document.removeEventListener("touchstart", forcePlayMusic);
                });
            }

            // Universal phone safety fallbacks: runs the split-second they scroll or tap the invitation card
            document.addEventListener("click", forcePlayMusic);
            document.addEventListener("touchstart", forcePlayMusic);
        });
    }
});
</script>
    
</body>
</html>
